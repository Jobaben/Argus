<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root {
    --ground:#0a0f16; --ground-2:#0c121b; --surface:#121b26; --line:rgb(146 180 217 / .14);
    --ink:#eaf2fb; --ink-dim:#9db0c6; --ink-faint:#8b9db4;
    --eye:#36e3e8; --run:#ffb224; --ok:#2fe6a4; --fail:#ff5765; --queue:#4db5ff; --await:#b585ff;
    --mono:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace;
  }
  @font-face { font-family:Hellix; src:url("../../fonts/Hellix-SemiBold-ma.woff2") format("woff2");
    font-weight:600; font-display:swap; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--ground); color:var(--ink);
    font-family:Hellix,"Segoe UI",system-ui,sans-serif; font-variant-numeric:tabular-nums;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:26px; }

  .panel { width:100%; max-width:860px; border:1px solid var(--line); border-radius:14px;
    background:var(--surface); padding:8px 16px 12px; }
  .axis, .lane, .grid { display:flex; }
  .gutter { width:168px; flex:none; }
  .track { position:relative; flex:1; min-width:0; }
  .axis .track { height:24px; }
  .tick { position:absolute; top:4px; transform:translateX(-50%);
    font-family:var(--mono); font-size:10px; color:var(--ink-faint); }
  .now { position:absolute; right:0; top:4px; font-family:var(--mono); font-size:10px;
    font-weight:700; color:var(--eye); }
  .body { position:relative; }
  .grid { position:absolute; inset:0; pointer-events:none; }
  .gl { position:absolute; top:0; bottom:0; width:1px; background:rgb(146 180 217 / .08); }
  .nowline { position:absolute; top:0; bottom:0; right:0; width:1px; background:rgb(54 227 232 / .5); }
  .lane { border-top:1px solid rgb(146 180 217 / .09); }
  .lane .gutter { padding:7px 12px 7px 0; }
  .badge { display:inline-block; margin-right:6px; border-radius:4px; padding:1px 4px;
    font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.1em; }
  .badge.sched   { color:var(--queue); background:rgb(77 181 255 / .12); }
  .badge.agent   { color:var(--eye); background:rgb(54 227 232 / .12); }
  .badge.session { color:var(--await); background:rgb(181 133 255 / .12); }
  .gname { font-size:12px; font-weight:600; color:var(--ink-dim); }
  .rows { flex:1; min-width:0; padding:4px 0; }
  .r { position:relative; height:28px; }
  .bar { position:absolute; top:2px; bottom:2px; display:flex; align-items:center;
    overflow:hidden; border-radius:4px; border:1px solid; }
  .bar span { padding:0 6px; font-size:10px; font-weight:600; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .bar.done    { background:rgb(47 230 164 / .2);  border-color:rgb(47 230 164 / .5);  color:var(--ok); }
  .bar.working { background:rgb(255 178 36 / .25); border-color:rgb(255 178 36 / .6);  color:var(--run); }
  .bar.failed  { background:rgb(255 87 101 / .25); border-color:rgb(255 87 101 / .6);  color:var(--fail); }
  .bar.open { border-right:0; border-radius:4px 0 0 4px; }
  .pulse { position:absolute; right:4px; top:50%; width:6px; height:6px; margin-top:-3px;
    border-radius:999px; background:currentColor; box-shadow:0 0 8px 1px currentColor;
    animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  @media (prefers-reduced-motion:reduce){ .pulse{animation:none} }
</style>
</head>
<body>
  <!-- Chronicle timeline: every run, agent, and session as a span on one time
       axis. Overlaps pack into extra rows; in-flight spans run open-ended into
       the eye-colored "now" line with a pulse. -->
  <div class="panel">
    <div class="axis">
      <div class="gutter"></div>
      <div class="track">
        <span class="tick" style="left:0%">14:00</span><span class="tick" style="left:25%">15:30</span>
        <span class="tick" style="left:50%">17:00</span><span class="tick" style="left:75%">18:30</span>
        <span class="now">now</span>
      </div>
    </div>
    <div class="body">
      <div class="grid" aria-hidden="true">
        <div class="gutter"></div>
        <div class="track">
          <span class="gl" style="left:25%"></span><span class="gl" style="left:50%"></span>
          <span class="gl" style="left:75%"></span><span class="nowline"></span>
        </div>
      </div>
      <div class="lane">
        <div class="gutter"><span class="badge agent">AGENT</span><span class="gname">Background agents</span></div>
        <div class="rows">
          <div class="r">
            <div class="bar done" style="left:6%;width:22%"><span>fix-ci</span></div>
            <div class="bar working open" style="left:62%;width:38%"><span>refactor-auth</span><i class="pulse"></i></div>
          </div>
          <div class="r"><div class="bar done" style="left:14%;width:18%"><span>bump-deps</span></div></div>
        </div>
      </div>
      <div class="lane">
        <div class="gutter"><span class="badge sched">SCHED</span><span class="gname">Nightly triage</span></div>
        <div class="rows">
          <div class="r">
            <div class="bar done" style="left:2%;width:9%"><span>ok</span></div>
            <div class="bar failed" style="left:44%;width:7%"><span>rate limit</span></div>
          </div>
        </div>
      </div>
      <div class="lane">
        <div class="gutter"><span class="badge session">SESSION</span><span class="gname">home/user/webapp</span></div>
        <div class="rows">
          <div class="r"><div class="bar working open" style="left:78%;width:22%"><span>Add dark mode toggle</span><i class="pulse"></i></div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
